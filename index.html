<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PRO GTA FINAL</title>
<style>
body{margin:0;overflow:hidden;background:#111;touch-action:none;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

// INTRO
let intro=true;
let introScale=0.5;
let introTimer=0;

// resize
function resize(){
  c.width=innerWidth;
  c.height=innerHeight;

  joy.baseX=c.width*0.15;
  joy.baseY=c.height*0.85;
  joy.x=joy.baseX;
  joy.y=joy.baseY;

  fireX=c.width*0.85;
  fireY=c.height*0.85;

  joy.r=Math.min(c.width,c.height)*0.08;
  joy.knob=joy.r*0.4;
}
window.addEventListener("resize",resize);

let joy={baseX:0,baseY:0,x:0,y:0,active:false,r:60,knob:25};
let fireX=0,fireY=0;
resize();

let moveTouchId=null,fireTouchId=null;

let bullets=[],enemies=[];

let player={x:1000,y:1000,angle:0,speed:1.8,hp:100};

let score=0;
let timeLeft=30;
let gameState="playing";

// map
const TILE=80,MAP_W=40,MAP_H=40;
let map=[];
for(let y=0;y<MAP_H;y++){
 map[y]=[];
 for(let x=0;x<MAP_W;x++){
  let r=Math.random();
  map[y][x]=r<0.1?"water":r<0.3?"road":"grass";
 }
}

// timer
setInterval(()=>{
 if(gameState==="playing"){
  timeLeft--;
  if(timeLeft<=0) gameState="win";
 }
},1000);

// shoot
function shoot(){
 bullets.push({
  x:player.x,
  y:player.y,
  vx:Math.cos(player.angle)*8,
  vy:Math.sin(player.angle)*8
 });
}

setInterval(()=>{
 if(fireTouchId && gameState==="playing"){
  shoot();
 }
},150);

// enemies
setInterval(()=>{
 if(gameState!=="playing")return;
 let a=Math.random()*Math.PI*2;
 let d=300;
 enemies.push({
  x:player.x+Math.cos(a)*d,
  y:player.y+Math.sin(a)*d,
  speed:1.2
 });
},800);

// touch
c.addEventListener("touchstart",e=>{
 for(let t of e.changedTouches){

  if(gameState!=="playing"){restart();return;}

  if(Math.hypot(t.clientX-joy.baseX,t.clientY-joy.baseY)<joy.r){
   moveTouchId=t.identifier; joy.active=true;
  }

  if(Math.hypot(t.clientX-fireX,t.clientY-fireY)<60){
   fireTouchId=t.identifier;
  }
 }
});

c.addEventListener("touchmove",e=>{
 for(let t of e.changedTouches){
  if(t.identifier===moveTouchId){
   joy.x=t.clientX; joy.y=t.clientY;
  }
 }
});

c.addEventListener("touchend",e=>{
 for(let t of e.changedTouches){
  if(t.identifier===moveTouchId){
   moveTouchId=null;
   joy.active=false;
   joy.x=joy.baseX;
   joy.y=joy.baseY;
  }
  if(t.identifier===fireTouchId){
   fireTouchId=null;
  }
 }
});

// restart
function restart(){
 player.hp=100;
 bullets=[]; enemies=[];
 score=0; timeLeft=30;
 gameState="playing";
}

// draw map
function drawMap(camX,camY){
 for(let y=0;y<MAP_H;y++){
  for(let x=0;x<MAP_W;x++){
   let t=map[y][x];
   ctx.fillStyle=t==="grass"?"#2ecc71":t==="road"?"#222":"#3498db";
   ctx.fillRect(x*TILE-camX,y*TILE-camY,TILE,TILE);
  }
 }
}

// loop
function update(){

 // INTRO (10 sec)
 if(intro){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.save();
  ctx.translate(c.width/2,c.height/2);
  ctx.scale(introScale,introScale);

  ctx.fillStyle="white";
  ctx.font="bold 40px Arial";
  ctx.textAlign="center";
  ctx.fillText("MADE BY PRIYANSHU",0,-20);

  ctx.font="20px Arial";
  let dots=".".repeat(Math.floor((introTimer/20)%4));
  ctx.fillText("LOADING"+dots,0,30);

  ctx.restore();

  introScale+=0.01;
  introTimer++;

  if(introTimer>600){ // ~10 sec
    intro=false;
  }

  requestAnimationFrame(update);
  return;
 }

 ctx.clearRect(0,0,c.width,c.height);

 let camX=player.x-c.width/2;
 let camY=player.y-c.height/2;

 // movement
 if(joy.active){
  let dx=joy.x-joy.baseX;
  let dy=joy.y-joy.baseY;
  let dist=Math.hypot(dx,dy);
  if(dist>5){
   let nx=dx/dist, ny=dy/dist;
   player.angle=Math.atan2(ny,nx);
   player.x+=nx*player.speed;
   player.y+=ny*player.speed;
  }
 }

 drawMap(camX,camY);

 // player
 ctx.save();
 ctx.translate(player.x-camX,player.y-camY);
 ctx.rotate(player.angle);
 ctx.beginPath();
 ctx.moveTo(20,0);
 ctx.lineTo(-12,-10);
 ctx.lineTo(-12,10);
 ctx.closePath();
 ctx.fillStyle="cyan";
 ctx.fill();
 ctx.restore();

 // bullets
 bullets.forEach(b=>{
  b.x+=b.vx; b.y+=b.vy;
  ctx.fillStyle="yellow";
  ctx.fillRect(b.x-camX,b.y-camY,5,5);
 });

 // enemies + DAMAGE FIX
 for(let i=enemies.length-1;i>=0;i--){
  let e=enemies[i];
  let dx=player.x-e.x, dy=player.y-e.y;
  let dist=Math.hypot(dx,dy);

  if(dist>1){
   e.x+=dx/dist*e.speed;
   e.y+=dy/dist*e.speed;
  }

  ctx.fillStyle="red";
  ctx.fillRect(e.x-camX,e.y-camY,25,25);

  if(dist<25){
   player.hp-=0.5;
   if(player.hp<=0){
    player.hp=0;
    gameState="gameover";
   }
  }

  for(let j=bullets.length-1;j>=0;j--){
   let b=bullets[j];
   if(b.x<e.x+25 && b.x+5>e.x && b.y<e.y+25 && b.y+5>e.y){
    enemies.splice(i,1);
    bullets.splice(j,1);
    score+=20;
    break;
   }
  }
 }

 // ❤️ health
 let barW=c.width*0.5;
 let hx=c.width/2-barW/2;
 let hy=c.height-100;

 ctx.fillStyle="black";
 ctx.fillRect(hx-5,hy-5,barW+10,25);

 ctx.fillStyle="lime";
 ctx.fillRect(hx,hy,(player.hp/100)*barW,15);

 // 🗺️ minimap FIX
 let miniX=10,miniY=10,size=120;
 let scale=size/(MAP_W*TILE);

 ctx.fillStyle="black";
 ctx.fillRect(miniX-2,miniY-2,size+4,size+4);

 for(let y1=0;y1<MAP_H;y1++){
  for(let x1=0;x1<MAP_W;x1++){
   let t=map[y1][x1];
   ctx.fillStyle=t==="grass"?"#2ecc71":t==="road"?"#555":"#3498db";
   ctx.fillRect(miniX+x1*TILE*scale,miniY+y1*TILE*scale,TILE*scale,TILE*scale);
  }
 }

 ctx.fillStyle="white";
 ctx.fillRect(miniX+player.x*scale,miniY+player.y*scale,4,4);

 enemies.forEach(e=>{
  ctx.fillStyle="red";
  ctx.fillRect(miniX+e.x*scale,miniY+e.y*scale,3,3);
 });

 // 🔥 BIG TEXT UI
 ctx.fillStyle="white";
 ctx.font="bold 24px Arial";
 ctx.fillText("⏱ "+timeLeft,c.width-120,40);
 ctx.fillText("Score: "+score,c.width-140,70);

 // controls
 ctx.beginPath();
 ctx.arc(joy.baseX,joy.baseY,joy.r,0,Math.PI*2);
 ctx.strokeStyle="white"; ctx.stroke();

 ctx.beginPath();
 ctx.arc(joy.x,joy.y,joy.knob,0,Math.PI*2);
 ctx.fillStyle="white"; ctx.fill();

 ctx.beginPath();
 ctx.arc(fireX,fireY,joy.r,0,Math.PI*2);
 ctx.fillStyle="red"; ctx.fill();

 ctx.fillStyle="white";
 ctx.textAlign="center";
 ctx.fillText("FIRE",fireX,fireY+5);

 // ☠️ GAME OVER POPUP FIX
 if(gameState!=="playing"){
  ctx.fillStyle="rgba(0,0,0,0.6)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="#222";
  ctx.fillRect(c.width/2-150,c.height/2-100,300,200);

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.textAlign="center";

  if(gameState==="win"){
    ctx.fillText("CONGRATULATIONS 🎉",c.width/2,c.height/2-40);
  }else{
    ctx.fillText("GAME OVER",c.width/2,c.height/2-40);
  }

  ctx.fillText("SCORE: "+score,c.width/2,c.height/2);
  ctx.fillText("PLAY AGAIN",c.width/2,c.height/2+60);
 }

 requestAnimationFrame(update);
}
update();
</script>
</body>
</html>
